name: Scorecard supply-chain security

on:
  # Re-scores when branch protection settings change. Full scoring for this check needs a
  # `repo_token` (a PAT with repo-admin read) since the default GITHUB_TOKEN can't read branch
  # protection on a public repo -- see https://github.com/ossf/scorecard-action#authentication-with-fine-grained-pat-optional.
  # Uncommented, the check just scores lower until one is added.
  branch_protection_rule:
  schedule:
    - cron: '30 1 * * 6'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Needed to upload results to the code-scanning dashboard.
      security-events: write
      # Needed by publish_results below (Sigstore keyless signing).
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes to the public OpenSSF API so the README badge renders a real score.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
