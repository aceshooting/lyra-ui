name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to (re-)publish, e.g. lyra-ui@3.7.1'
        required: true
        type: string
      dry_run:
        description: 'Run npm publish --dry-run instead of a real publish'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Resolve release tag
        id: tag
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="$DISPATCH_TAG"
          else
            TAG="$RELEASE_TAG"
          fi
          if [[ -z "$TAG" ]]; then
            echo "::error::No tag resolved from the release event or workflow_dispatch input."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Resolve package from tag
        id: pkg
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          DIR_NAME="${TAG%@*}"
          DIR="packages/$DIR_NAME"
          if [[ ! -f "$DIR/package.json" ]]; then
            echo "::error::No package.json at '$DIR' (resolved from tag '$TAG')."
            exit 1
          fi
          PKG_NAME="$(node -p "require('./$DIR/package.json').name")"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "name=$PKG_NAME" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Install the npm CLI from the commit that publishes npm 12.0.1. The full Git SHA keeps
      # this build dependency immutable; update the SHA and expected version together.
      - name: Update npm CLI (trusted publishing needs >=11.5.1)
        run: |
          npm i -g git+https://github.com/npm/cli.git#868e586497cdc17b66eb9a8424bad67136e789f9
          test "$(npm --version)" = "12.0.1"

      # --if-present mirrors scripts/publish.sh's own per-package gate: lyra-flags has no "build"
      # script (its generated index is produced by `prepack` at publish time), only lyra-ui does.
      - name: Build package
        run: pnpm --filter "${{ steps.pkg.outputs.name }}" run --if-present build

      - name: Download release tarball
        id: release_asset
        if: ${{ github.event_name == 'release' || inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          dir="$RUNNER_TEMP/release-assets"
          mkdir -p "$dir"
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*.tgz' --dir "$dir"

          tarball="$(find "$dir" -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          test -n "$tarball"
          echo "path=$tarball" >> "$GITHUB_OUTPUT"

      - name: Generate release provenance
        id: attest
        if: ${{ github.event_name == 'release' || inputs.dry_run != true }}
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: ${{ steps.release_asset.outputs.path }}

      - name: Upload provenance to GitHub release
        if: ${{ github.event_name == 'release' || inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          TARBALL: ${{ steps.release_asset.outputs.path }}
          BUNDLE: ${{ steps.attest.outputs.bundle-path }}
        run: |
          provenance="$TARBALL.sigstore.json"
          intoto="$TARBALL.intoto.jsonl"
          cp "$BUNDLE" "$provenance"
          cp "$BUNDLE" "$intoto"
          gh release upload "$TAG" "$provenance" "$intoto" --repo "$GITHUB_REPOSITORY" --clobber

      - name: Publish to npm
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            npm publish --access public --dry-run
          else
            npm publish --access public
          fi
