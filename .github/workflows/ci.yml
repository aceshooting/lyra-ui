name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aceshooting/lyra-ui exec playwright install --with-deps chromium
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm manifest
      - name: Verify published tarball contents
        run: |
          set -euo pipefail
          out="$(pnpm --filter @aceshooting/lyra-ui pack --dry-run 2>&1)"
          echo "$out"
          missing=0
          for f in custom-elements.json llms.txt llms-full.txt; do
            if ! grep -qF "$f" <<< "$out"; then
              echo "::error::tarball is missing expected file: $f"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            echo "::error::one or more expected files missing from the published tarball -- check files/exports/sideEffects in packages/lyra-ui/package.json"
            exit 1
          fi
