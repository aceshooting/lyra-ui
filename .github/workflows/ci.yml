name: CI

on:
  push:
    branches: [main]
  pull_request:

# No job pushes, comments, or otherwise writes to the repo -- checkout and
# artifact upload/download both work fine under read-only contents access.
permissions:
  contents: read

# Shared bootstrap steps, repeated per job (rather than built + uploaded once as an artifact)
# because `pnpm install`/`pnpm build` are only a few seconds each here -- far cheaper than the
# artifact upload/download round trip would cost, and it keeps every job independently
# reproducible from a clean checkout.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  # Static/config consistency checks: none of these need a library build, a docs build, or a
  # browser -- they read already-committed files (custom-elements.json, llms/, plugin manifests,
  # README) and either validate or regenerate-and-diff them.
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # lyra-ui's own Chromium suite runs in the build-and-coverage job via test:coverage --
      # this only needs to cover the other workspace package(s), e.g. lyra-flags's own test script.
      - run: pnpm --filter '!@aceshooting/lyra-ui' -r test
      # knip.jsonc's `entry` patterns model the wildcard `./components/*`/`./internal/*` package
      # exports, so a failure here is a genuinely orphaned file/script or an unused/unlisted
      # dependency -- not the whole library being flagged dead. See knip.jsonc's own header comment.
      - run: pnpm run check:dead-code
      - run: pnpm manifest
      - run: git diff --exit-code -- packages/lyra-ui/custom-elements.json
      - run: pnpm readme:check
      - run: ./package.sh
      - run: git diff --exit-code -- plugins/lyra-ui/skills/lyra-ui/references/
      - run: pnpm skill:check
      - run: pnpm storybook:check-theme

  # The one time lyra-ui's own Chromium suite actually runs (a separate `pnpm test` step would
  # just re-run the identical file set with coverage instrumentation off). This is the longest
  # single job (test:coverage alone runs ~4.5min) -- everything it needs (build, bundle-size,
  # coverage) is sequential and dist-dependent, so it stays one job rather than splitting further.
  build-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aceshooting/lyra-ui exec playwright install --with-deps chromium
      # src/package-entrypoints.test.ts dynamically imports the package's published entry points
      # (./dist/lyra.js etc., per package.json's "exports"), which only exist after a build.
      - run: pnpm build
      # Needs dist/ from the build step above: measures the library's own esbuild-bundled gzip
      # weight (optional peers externalized) against the budgets in
      # packages/lyra-ui/scripts/bundle-budgets.json, and re-measures every per-component entry so
      # the sizes the README badges publish from packages/lyra-ui/scripts/bundle-stats.json cannot
      # silently go stale.
      - run: pnpm --filter @aceshooting/lyra-ui check:bundle-size
      # Reports the same six esbuild-bundled entry points to Codecov as the `lyra-ui-dist`
      # bundle, for per-PR size deltas. The blocking weight gate is check:bundle-size above;
      # this step is non-fatal and no-ops entirely without CODECOV_TOKEN.
      - name: Upload library bundle analysis to Codecov
        run: pnpm --filter @aceshooting/lyra-ui codecov:bundle
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - run: pnpm --filter @aceshooting/lyra-ui test:coverage
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          files: packages/lyra-ui/coverage/lcov.info
          # codecov.yml declares a `lyra-ui` flag (scoped to packages/lyra-ui/src/**) and
          # comment.layout renders a `flags` section. A flag only ever receives data from
          # uploads tagged with it, so without this the flag stays permanently empty and
          # that section of the PR comment renders blank.
          flags: lyra-ui
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@6ba3fdeec616fb91fd6a389b788a2366835a0fa2 # v1.2.1
        with:
          file: packages/lyra-ui/coverage/junit.xml
          flags: lyra-ui
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Needs dist/ (the tarball's `files` list includes it) but not the Chromium test suite or the
  # docs build -- independent of build-and-coverage other than both running `pnpm build`.
  packed-consumer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Verify published tarball contents
        run: |
          set -euo pipefail
          out="$(pnpm --filter @aceshooting/lyra-ui pack --dry-run 2>&1)"
          echo "$out"
          missing=0
          for f in custom-elements.json llms.txt llms-full.txt llms/index.md llms/shared.md llms/tokens.md llms/peers.md llms/migration.md llms/components/lr-table.md; do
            if ! grep -qF "$f" <<< "$out"; then
              echo "::error::tarball is missing expected file: $f"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            echo "::error::one or more expected files missing from the published tarball -- check files/exports/sideEffects in packages/lyra-ui/package.json"
            exit 1
          fi
      # Includes a single-component (<lr-button>) gzip-size canary, gated far tighter than the
      # core-bundle budget, to catch a PR that silently drags something heavy into the eager
      # import graph -- see bundleEntries.button in scripts/check-packed-consumer.mjs.
      - run: pnpm check:packed-consumer

  # docs:build only needs the already-committed custom-elements.json (via manifest:check), not
  # dist/ -- independent of build-and-coverage/packed-consumer. storybook:check drives Chromium
  # against the built storybook-static/, so this job still needs Playwright.
  docs-and-storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aceshooting/lyra-ui exec playwright install --with-deps chromium
      # CODECOV_TOKEN is what arms the Codecov bundle-analysis plugin in .storybook/main.js;
      # without it the storybook build runs exactly as before and uploads nothing. Only this job's
      # docs:build carries the token -- the visual-regression job also runs docs:build (it needs
      # storybook-static/ too) and deliberately omits it, so the bundle-analysis upload doesn't fire
      # twice for the same commit.
      - run: pnpm docs:build
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - run: git diff --exit-code -- .storybook/sitemap.xml
      - run: pnpm docs:check
      - run: pnpm storybook:check

  # Blocking as of the 2026-07-20 font-substitution determinism fix (see
  # packages/lyra-ui/visual-baselines/README.md): a full 62-story x 3-axis run now reproduces
  # 186/186 clean, so a mismatch here is a real signal rather than run-to-run capture noise. Split
  # into its own job (rather than folded into docs-and-storybook, which also needs docs:build)
  # because test:visual alone runs ~3.5min and would otherwise sit in the critical path of the
  # faster docs checks.
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aceshooting/lyra-ui exec playwright install --with-deps chromium
      - run: pnpm docs:build
      - name: Visual regression
        run: pnpm --filter @aceshooting/lyra-ui test:visual
      - name: Upload visual regression diff artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-regression-diff
          path: packages/lyra-ui/.visual-diff-output
          if-no-files-found: ignore
          retention-days: 14

  platform-contracts:
    name: ${{ matrix.browser }} / Node ${{ matrix.node-version }}
    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, webkit]
        node-version: [20, 22]
    runs-on: ubuntu-latest
    env:
      # packageManager pins pnpm 11, which requires Node >=22.13 and crashes
      # (imports node:sqlite) under Node 20. The Node 20 leg below installs a
      # compatible pnpm 10 instead, but pnpm has its own Corepack-like
      # "manage package manager versions" self-enforcement: any pnpm binary
      # run from this repo root notices the packageManager mismatch and
      # silently re-execs itself as 11.10.0, reintroducing the crash. Disable
      # that self-management for this job (harmless on the Node 22 leg, where
      # the installed version already matches packageManager).
      npm_config_manage_package_manager_versions: 'false'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          # pnpm/action-setup hard-errors if `version` is given and differs
          # from packageManager, so point it at an alternate file with a
          # Node-20-compatible pnpm version for that leg instead of
          # overriding `version` directly.
          package_json_file: ${{ matrix.node-version == 20 && '.github/ci-pnpm10.json' || 'package.json' }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @aceshooting/lyra-ui exec playwright install --with-deps ${{ matrix.browser }}
      - name: Run platform contract suite
        env:
          WTR_BROWSER: ${{ matrix.browser }}
          WTR_STRICT_CONSOLE: '1'
        run: pnpm --filter @aceshooting/lyra-ui test:platform
