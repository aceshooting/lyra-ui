name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read

    strategy:
      fail-fast: false
      matrix:
        # actions: lints .github/workflows/*.yml itself (e.g. missing `permissions:`) -- the
        # default setup this replaced covered it, so keep parity here.
        language: [javascript-typescript, actions]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1
        with:
          category: "/language:${{ matrix.language }}"
