<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lyra UI — Playground</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 60rem;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      section {
        margin-block: 2.5rem;
      }
      h2 {
        border-bottom: 1px solid #ddd;
        padding-bottom: 0.25rem;
      }
      .row {
        display: flex;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <h1>Lyra UI — Playground</h1>

    <section>
      <h2>Sparkline</h2>
      <div class="row">
        <lyra-sparkline id="spark-line"></lyra-sparkline>
        <lyra-sparkline id="spark-area" type="area"></lyra-sparkline>
        <lyra-sparkline id="spark-bar" type="bar"></lyra-sparkline>
      </div>
    </section>

    <section>
      <h2>Combobox</h2>
      <lyra-combobox label="Fruit" placeholder="Pick one…" with-clear style="max-width: 20rem">
        <lyra-option value="a">Apple</lyra-option>
        <lyra-option value="b">Banana</lyra-option>
        <lyra-option value="c">Cherry</lyra-option>
        <lyra-option value="d">Date</lyra-option>
      </lyra-combobox>
    </section>

    <section>
      <h2>Date input &amp; picker</h2>
      <div class="row" style="align-items: start">
        <lyra-date-input label="Start date" with-clear style="max-width: 16rem"></lyra-date-input>
        <lyra-date-picker mode="range" months="2"></lyra-date-picker>
      </div>
    </section>

    <section>
      <h2>Toast</h2>
      <div class="row">
        <button id="toast-info">Neutral</button>
        <button id="toast-success">Success</button>
        <button id="toast-danger">Danger + action</button>
      </div>
    </section>

    <section>
      <h2>Flags</h2>
      <div class="row">
        <lyra-flag country="fr" style="height: 1.5rem"></lyra-flag>
        <lyra-flag language="en" style="height: 1.5rem"></lyra-flag>
        <lyra-flag language="de" round style="height: 1.5rem"></lyra-flag>
        <lyra-flag country="jp" round style="height: 1.5rem"></lyra-flag>
      </div>
    </section>

    <section>
      <h2>Stat</h2>
      <div class="row">
        <lyra-stat label="Revenue" value="12.4" unit="k€" trend="3.2" variant="success"></lyra-stat>
        <lyra-stat label="Errors" value="128" trend="-5.1" variant="danger"></lyra-stat>
        <lyra-stat label="Sessions" value="9,204"></lyra-stat>
      </div>
    </section>

    <section>
      <h2>Table</h2>
      <lyra-table id="demo-table"></lyra-table>
    </section>

    <section>
      <h2>Gauge</h2>
      <div class="row">
        <lyra-gauge value="72" max="100" label="CPU"></lyra-gauge>
        <lyra-gauge type="linear" value="40" max="100" label="Disk"></lyra-gauge>
      </div>
    </section>

    <section>
      <h2>Export button</h2>
      <div class="row">
        <lyra-export-button id="demo-export" filename="demo"></lyra-export-button>
      </div>
    </section>

    <section>
      <h2>Split</h2>
      <lyra-split style="height: 8rem; border: 1px solid #ddd">
        <div style="padding: 0.5rem">Panel A</div>
        <div style="padding: 0.5rem">Panel B</div>
        <div style="padding: 0.5rem">Panel C</div>
      </lyra-split>
    </section>

    <section>
      <h2>Empty</h2>
      <lyra-empty heading="No results" description="Try a different search.">
        <span slot="actions"><button>Reset</button></span>
      </lyra-empty>
    </section>

    <section>
      <h2>Skeleton</h2>
      <div class="row">
        <lyra-skeleton width="10rem" height="1rem"></lyra-skeleton>
        <lyra-skeleton variant="circle" width="3rem" height="3rem"></lyra-skeleton>
        <lyra-skeleton variant="rect" effect="sheen" width="6rem" height="3rem"></lyra-skeleton>
      </div>
    </section>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
